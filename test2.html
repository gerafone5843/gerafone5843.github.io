<div class="container">

<h2>Can You Be Hacked?</h2>
<p>This test evaluates your online behavior and potential security risks.</p>

<div id="quiz">
<p id="question"></p>
<button class="answer" onclick="answer(1)">Yes</button>
<button class="answer" onclick="answer(0)">No</button>
</div>

<div id="result" style="display:none;"></div>

</div>

<script>
let q = [
"Do you share personal info online?",
"Do you reuse passwords?",
"Do you ignore updates?",
"Do you open unknown emails?",
"Do you use antivirus?"
];

let i = 0, score = 0;

function showQ(){
document.getElementById("question").innerText = q[i];
}

function answer(v){
if(v===1) score++;
i++;
if(i<q.length) showQ();
else showR();
}

function showR(){
document.getElementById("quiz").style.display="none";
let r = "";
if(score<=2) r="You are SAFE 😎";
else if(score<=4) r="Medium Risk ⚠️";
else r="High Risk 😬";
document.getElementById("result").style.display="block";
document.getElementById("result").innerText = r;
}

showQ();
</script>

</body>
</html>
